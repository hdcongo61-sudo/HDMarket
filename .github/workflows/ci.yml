name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, test, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Syntax-check every controller/route/util (catches load-time errors tests don't reach)
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check
      # Hard gate on critical vulnerabilities only — several high-severity findings
      # currently require major version bumps of critical-path packages
      # (cloudinary, nodemailer, firebase-admin) that need a scoped upgrade +
      # manual smoke test, not a CI-blocking auto-bump. Tracked, not ignored:
      # `npm audit` locally shows the full picture.
      - run: npm audit --audit-level=critical
      - name: Known high-severity findings (informational, non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend (lint, test, build, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=critical
      - name: Known high-severity findings (informational, non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true
